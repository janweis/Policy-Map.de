name: "🐞 Bug report / Fehlerbericht"
description: "Report a problem with the export scripts or the Policy Map tool. / Ein Problem mit den Export-Skripten oder dem Policy-Map-Tool melden."
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Danke für die Meldung! / Thanks for reporting!
        **Bitte keine echten Firewall-Daten, IP-Adressen oder Kundennamen anhängen.**
        **Do not attach real firewall data, IP addresses or customer names.**
  - type: textarea
    id: description
    attributes:
      label: "Beschreibung / Description"
      description: "Was ist passiert? Was hast du erwartet? / What happened? What did you expect?"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Schritte zum Reproduzieren / Steps to reproduce"
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: false
  - type: dropdown
    id: vendor
    attributes:
      label: "Firewall-Hersteller / Firewall vendor"
      options:
        - FortiGate
        - FortiManager
        - Sophos XGS
        - "Other / n. a."
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: "App-Version"
      description: "Aus dem About-Dialog des Tools. / From the tool's About dialog."
      placeholder: "z. B. 0.11.0"
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: "Browser"
      placeholder: "z. B. Edge 126 / Firefox 128 (Windows 11)"
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: "Weitere Hinweise / Additional context"
      description: "Fehlermeldungen, Screenshots (anonymisiert). / Error messages, screenshots (anonymized)."
    validations:
      required: false
